pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,json,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: eslint
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true
    - name: typecheck
      run: pnpm typecheck

pre-push:
  jobs:
    - name: test
      run: pnpm test:run
